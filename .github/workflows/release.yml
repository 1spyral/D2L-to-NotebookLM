name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all targets
        run: pnpm run build

      - name: Package builds
        run: |
          cd dist
          zip -r ../d2l-to-notebooklm-chrome-${{ github.ref_name }}.zip chrome/
          zip -r ../d2l-to-notebooklm-firefox-${{ github.ref_name }}.zip firefox/
          zip -r ../d2l-to-notebooklm-safari-${{ github.ref_name }}.zip safari/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            d2l-to-notebooklm-chrome-${{ github.ref_name }}.zip
            d2l-to-notebooklm-firefox-${{ github.ref_name }}.zip
            d2l-to-notebooklm-safari-${{ github.ref_name }}.zip
